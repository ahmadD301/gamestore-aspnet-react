name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Tests
        run: dotnet test --no-build

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Frontend Dependencies
        working-directory: frontend/gamestore-web
        run: npm ci

      - name: Restore Backend
        run: dotnet restore backend/GameStore.sln

      - name: Build Backend
        run: dotnet build backend/GameStore.sln --no-restore

      - name: Start Backend API
        run: |
          dotnet run \
            --project backend/GameStore.Api/GameStore.Api.csproj \
            --no-build \
            --urls=http://localhost:5062 &
        env:
          ASPNETCORE_ENVIRONMENT: Testing

      - name: Wait for Backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5062/swagger; then
              echo "Backend ready!"
              exit 0
            fi

            echo "Waiting..."
            sleep 2
          done

          echo "Backend failed to start."
          exit 1

      - name: Run Vitest
        working-directory: frontend/gamestore-web
        run: npm run test -- --run
        env:
          VITE_API_URL: http://localhost:5062

      - name: Install Playwright Browsers
        working-directory: frontend/gamestore-web
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        working-directory: frontend/gamestore-web
        run: npm run test:e2e
        env:
          VITE_API_URL: http://localhost:5062

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/gamestore-web/playwright-report/
          retention-days: 7